<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BusBooking - Bus Ticket Booking System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Navbar Fragment -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-bus-front-fill me-2"></i>BusBooking
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"><i class="bi bi-house-fill me-1"></i>Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/team}"><i class="bi bi-person-vcard-fill me-1"></i>Team</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/members}"><i class="bi bi-diagram-3-fill me-1"></i>Members</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/customers}"><i class="bi bi-people-fill me-1"></i>Customers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/addresses}"><i class="bi bi-geo-alt-fill me-1"></i>Addresses</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/agencies}"><i class="bi bi-building me-1"></i>Agencies</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/buses}"><i class="bi bi-bus-front me-1"></i>Buses</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/drivers}"><i class="bi bi-person-badge me-1"></i>Drivers</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/routes}"><i class="bi bi-signpost-split me-1"></i>Routes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/trips}"><i class="bi bi-calendar-event me-1"></i>Trips</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/bookings}"><i class="bi bi-ticket-perforated me-1"></i>Bookings</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/payments}"><i class="bi bi-credit-card me-1"></i>Payments</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/view/reviews}"><i class="bi bi-star-fill me-1"></i>Reviews</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

</body>
</html>
