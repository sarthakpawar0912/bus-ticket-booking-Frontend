<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="page-title-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-geo-alt-fill me-2"></i>Address Management</h2>
        <a th:href="@{/view/addresses/add}" class="btn btn-light">
            <i class="bi bi-plus-circle me-1"></i>Add Address
        </a>
    </div>
</div>

<div class="container">
    <div th:if="${message}" class="alert alert-success flash-message" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger flash-message" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Address</th>
                        <th>City</th>
                        <th>State</th>
                        <th>Zip Code</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="a : ${addresses}">
                        <td th:text="${a.addressId}"></td>
                        <td th:text="${a.address}"></td>
                        <td th:text="${a.city}"></td>
                        <td th:text="${a.state}"></td>
                        <td th:text="${a.zipCode}"></td>
                        <td>
                            <a th:href="@{/view/addresses/edit/{id}(id=${a.addressId})}" class="btn btn-sm btn-outline-primary btn-action">
                                <i class="bi bi-pencil-square"></i> Edit
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(addresses)}">
                        <td colspan="6" class="text-center text-muted py-4">No addresses found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
