<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-4">
    <div class="form-container">
        <h2><i class="bi bi-building me-2 text-primary"></i>Add Agency</h2>
        <form th:action="@{/view/agencies/save}" method="post" th:object="${agency}">
            <div class="mb-3">
                <label for="name" class="form-label">Agency Name</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Enter agency name" required>
            </div>
            <div class="mb-3">
                <label for="contactPersonName" class="form-label">Contact Person</label>
                <input type="text" class="form-control" id="contactPersonName" th:field="*{contactPersonName}" placeholder="Enter contact person name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Enter email" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" th:field="*{phone}" placeholder="Enter 10-digit phone" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i>Save Agency
                </button>
                <a th:href="@{/view/agencies}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
