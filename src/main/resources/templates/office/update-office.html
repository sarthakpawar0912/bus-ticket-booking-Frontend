<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-warning"></i>Edit Agency Office</h2>
        <a th:href="@{/view/offices}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/view/offices/update/{id}(id=${office.officeId})}"
                  th:object="${office}" method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        <span>Parent Agency</span>
                    <select class="form-select" th:field="*{agencyId}" required>
                        <option th:each="a : ${agencies}" th:value="${a.agencyId}"
                                th:selected="${a.agencyId == office.agencyId}"
                                th:text="${a.name + ' (' + a.email + ')'}"></option>
                    </select>
                    </label>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        <span>Office Email</span>
                    <input type="email" class="form-control" th:field="*{officeMail}" required/>
                    </label>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        <span>Contact Person Name</span>
                    <input type="text" class="form-control" th:field="*{officeContactPersonName}" required/>
                    </label>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">
                        <span>Contact Number (10 digits)</span>
                    <input type="tel" class="form-control" th:field="*{officeContactNumber}" required
                           pattern="^\d{10}$"/>
                    </label>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">
                        <span>Office Address</span>
                    <select class="form-select" th:field="*{officeAddressId}" required>
                        <option th:each="a : ${addresses}" th:value="${a.addressId}"
                                th:selected="${a.addressId == office.officeAddressId}"
                                th:text="${a.address + ', ' + a.city + ' - ' + a.zipCode}"></option>
                    </select>
                    </label>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-save me-1"></i>Update Office
                    </button>
                    <a th:href="@{/view/offices}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
