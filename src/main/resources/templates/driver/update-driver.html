<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-4">
    <div class="form-container">
        <h2><i class="bi bi-pencil-square me-2 text-primary"></i>Update Driver</h2>
        <form th:action="@{/view/drivers/update/{id}(id=${driver.driverId})}" method="post">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" th:value="${driver.name}" required>
            </div>
            <div class="mb-3">
                <label for="licenseNumber" class="form-label">License Number</label>
                <input type="text" class="form-control" id="licenseNumber" name="licenseNumber" th:value="${driver.licenseNumber}" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" th:value="${driver.phone}" required>
            </div>
            <div class="mb-3">
                <label for="officeId" class="form-label">Office</label>
                <select class="form-select" id="officeId" name="officeId">
                    <option value="">-- Select Office --</option>
                    <option th:each="office : ${offices}"
                            th:value="${office.officeId}"
                            th:selected="${office.officeId == driver.officeId}"
                            th:text="${office.officeId + ' - ' + (office.officeCity != null ? office.officeCity : 'Office')}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label for="addressId" class="form-label">Address</label>
                <select class="form-select" id="addressId" name="addressId">
                    <option value="">-- Select Address --</option>
                    <option th:each="address : ${addresses}"
                            th:value="${address.addressId}"
                            th:selected="${address.addressId == driver.addressId}"
                            th:text="${address.city + ' - ' + address.address}"></option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i>Update Driver
                </button>
                <a th:href="@{/view/drivers}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
