<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="page-title-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-person-badge me-2"></i>Driver Management</h2>
        <a th:href="@{/view/drivers/add}" class="btn btn-light">
            <i class="bi bi-plus-circle me-1"></i>Add Driver
        </a>
    </div>
</div>

<div class="container">
    <div th:if="${message}" class="alert alert-success flash-message" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger flash-message" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>License Number</th>
                        <th>Phone</th>
                        <th>Office ID</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="d : ${drivers}">
                        <td th:text="${d.driverId}"></td>
                        <td th:text="${d.name}"></td>
                        <td th:text="${d.licenseNumber}"></td>
                        <td th:text="${d.phone}"></td>
                        <td th:text="${d.officeId}"></td>
                        <td>
                            <a th:href="@{/view/drivers/edit/{id}(id=${d.driverId})}" class="btn btn-sm btn-outline-primary btn-action me-1">
                                <i class="bi bi-pencil-square"></i> Edit
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(drivers)}">
                        <td colspan="6" class="text-center text-muted py-4">No drivers found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
