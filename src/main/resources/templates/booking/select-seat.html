<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="page-title-bar">
    <div class="container">
        <h2><i class="bi bi-grid-3x3 me-2"></i>Select Your Seats</h2>
    </div>
</div>

<div class="container my-4">
    <!-- Flash error (past trip / duplicate seats / insufficient seats / etc.) -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Trip Details -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <h5 class="mb-1">
                        <span th:text="${trip.fromCity}">Origin</span>
                        <i class="bi bi-arrow-right text-primary mx-2" aria-hidden="true"></i>
                        <span th:text="${trip.toCity}">Destination</span>
                    </h5>
                    <span class="badge bg-info" th:text="${trip.busType}"></span>
                </div>
                <div class="col-md-3">
                    <small class="text-muted">Departure</small>
                    <p class="mb-0 fw-bold" th:text="${trip.departureTime}"></p>
                </div>
                <div class="col-md-3">
                    <small class="text-muted">Arrival</small>
                    <p class="mb-0 fw-bold" th:text="${trip.arrivalTime}"></p>
                </div>
                <div class="col-md-2 text-end">
                    <small class="text-muted">Fare per seat</small>
                    <p class="mb-0 fw-bold text-primary fs-5" th:text="'Rs. ' + ${trip.fare}"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Seat Legend -->
    <div class="seat-legend mb-3">
        <div class="seat-legend-item">
            <div class="seat-legend-box available"></div>
            <span>Available</span>
        </div>
        <div class="seat-legend-item">
            <div class="seat-legend-box booked"></div>
            <span>Booked</span>
        </div>
        <div class="seat-legend-item">
            <div class="seat-legend-box selected"></div>
            <span>Selected</span>
        </div>
    </div>

    <!-- Booking Form -->
    <form th:action="@{/view/bookings/book}" method="post" id="bookingForm">
        <input type="hidden" name="tripId" th:value="${trip.tripId}">

        <!-- Customer Selection -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <label for="customerId" class="form-label fw-bold">Select Customer</label>
                <select class="form-select" id="customerId" name="customerId" required>
                    <option value="">-- Select Customer --</option>
                    <option th:each="c : ${customers}"
                            th:value="${c.id}"
                            th:text="${c.name + ' (' + c.email + ')'}"></option>
                </select>
            </div>
        </div>

        <!-- Seat Grid -->
        <div class="text-center mb-2">
            <h5><i class="bi bi-bus-front me-2"></i>Bus Layout</h5>
        </div>
        <div class="seat-grid" id="seatGrid">
            <div th:each="seat : ${allSeats}" class="seat-wrapper">
                <div th:if="${#lists.contains(bookedSeats, seat)}"
                     class="seat booked"
                     th:text="${seat}">
                </div>
                <button type="button" th:unless="${#lists.contains(bookedSeats, seat)}"
                     class="seat available"
                     th:attr="data-seat=${seat}"
                     th:text="${seat}"
                     tabindex="0"
                     onclick="toggleSeat(this)"
                     onkeydown="if(event.key==='Enter')this.click()">
                </button>
            </div>
        </div>

        <!-- Hidden container for selected seat inputs -->
        <div id="selectedSeatsContainer"></div>

        <!-- Summary -->
        <div class="text-center mt-4">
            <p class="mb-2">Selected Seats: <strong id="selectedSeatsList">None</strong></p>
            <p class="mb-3">Total Fare: <strong class="text-primary fs-5" id="totalFare">Rs. 0</strong></p>
            <button type="submit" class="btn btn-primary btn-lg px-5" id="submitBtn" disabled>
                <i class="bi bi-check-circle me-2"></i>Proceed to Payment
            </button>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
    const farePerSeat = /*[[${trip.fare}]]*/ 0;
    let selectedSeats = [];

    function toggleSeat(element) {
        const seatNum = Number.parseInt(element.dataset.seat, 10);

        if (element.classList.contains('selected')) {
            element.classList.remove('selected');
            element.classList.add('available');
            selectedSeats = selectedSeats.filter(s => s !== seatNum);
        } else {
            element.classList.remove('available');
            element.classList.add('selected');
            selectedSeats.push(seatNum);
        }

        selectedSeats.sort((a, b) => a - b);
        updateSummary();
    }

    function updateSummary() {
        const seatsList = document.getElementById('selectedSeatsList');
        const totalFare = document.getElementById('totalFare');
        const submitBtn = document.getElementById('submitBtn');
        const container = document.getElementById('selectedSeatsContainer');

        // Clear existing hidden inputs
        container.innerHTML = '';

        if (selectedSeats.length === 0) {
            seatsList.textContent = 'None';
            totalFare.textContent = 'Rs. 0';
            submitBtn.disabled = true;
        } else {
            seatsList.textContent = selectedSeats.join(', ');
            totalFare.textContent = 'Rs. ' + (selectedSeats.length * farePerSeat).toFixed(2);
            submitBtn.disabled = false;

            // Add hidden inputs for each selected seat
            selectedSeats.forEach(function(seat) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'seatNumbers';
                input.value = seat;
                container.appendChild(input);
            });
        }
    }
</script>
</body>
</html>
