<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-files me-2 text-primary"></i>Download Group Booking Ticket</h2>
        <a th:href="@{/view/bookings}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <p class="text-muted">
                Enter comma-separated booking IDs (e.g. <code>101,102,103</code>) to generate a single
                consolidated PDF ticket for all of them.
            </p>
            <form action="/api/bookings/group-ticket" method="get" class="row g-3">
                <div class="col-md-8">
                    <label for="groupticketdownload_bookingIds" class="form-label fw-semibold">Booking IDs (comma-separated)</label>
                    <input type="text" name="bookingIds" id="groupticketdownload_bookingIds" class="form-control" required
                           placeholder="101,102,103" pattern="^[0-9]+(\s*,\s*[0-9]+)*$" aria-label="bookingIds"/>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-download me-1"></i>Download Group PDF
                    </button>
                    <a th:href="@{/view/bookings}" class="btn btn-outline-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
