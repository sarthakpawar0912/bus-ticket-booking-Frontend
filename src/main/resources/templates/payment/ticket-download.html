<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>Download Ticket</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-file-earmark-pdf me-2 text-primary"></i>Download Ticket</h2>
        <a th:href="@{/view/payments}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <p class="text-muted">
                Enter a Payment ID to download the boarding-pass PDF. If the payment is part of a
                multi-seat transaction, a single consolidated group ticket listing every seat is
                generated automatically.
            </p>

            <form id="ticketForm" class="row g-3">
                <div class="col-md-6">
                    <label for="paymentIdInput" class="form-label fw-semibold">Payment ID</label>
                    <input id="paymentIdInput" name="paymentId" type="number"
                           class="form-control" required min="1" placeholder="e.g. 320"/>
                </div>
                <div class="col-12 d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-download me-1"></i>Download Ticket
                    </button>
                    <a th:href="@{/view/payments}" class="btn btn-outline-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>

<script th:inline="none">
    document.getElementById('ticketForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var id = document.getElementById('paymentIdInput').value.trim();
        if (id) {
            globalThis.location.href = '/api/payments/' + encodeURIComponent(id) + '/ticket';
        }
    });
</script>
</body>
</html>
