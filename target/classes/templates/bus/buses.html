<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="page-title-bar">
    <div class="container d-flex justify-content-between align-items-center">
        <h2><i class="bi bi-bus-front me-2"></i>Bus Management</h2>
        <a th:href="@{/view/buses/add}" class="btn btn-light">
            <i class="bi bi-plus-circle me-1"></i>Add Bus
        </a>
    </div>
</div>

<div class="container">
    <div th:if="${message}" class="alert alert-success flash-message" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-danger flash-message" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${error}"></span>
    </div>

    <div class="table-container">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Registration Number</th>
                        <th>Capacity</th>
                        <th>Type</th>
                        <th>Office ID</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${buses}">
                        <td th:text="${b.busId}"></td>
                        <td th:text="${b.registrationNumber}"></td>
                        <td th:text="${b.capacity}"></td>
                        <td><span class="badge bg-info" th:text="${b.type}"></span></td>
                        <td th:text="${b.officeId}"></td>
                        <td>
                            <a th:href="@{/view/buses/edit/{id}(id=${b.busId})}" class="btn btn-sm btn-outline-primary btn-action me-1">
                                <i class="bi bi-pencil-square"></i> Edit
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(buses)}">
                        <td colspan="6" class="text-center text-muted py-4">No buses found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
