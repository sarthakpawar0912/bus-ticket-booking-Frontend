<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-4">
    <div class="form-container">
        <h2><i class="bi bi-person-badge me-2 text-primary"></i>Add Driver</h2>
        <form th:action="@{/view/drivers/save}" method="post" th:object="${driver}">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="Enter driver name" required>
            </div>
            <div class="mb-3">
                <label for="licenseNumber" class="form-label">License Number</label>
                <input type="text" class="form-control" id="licenseNumber" th:field="*{licenseNumber}" placeholder="Enter license number" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" th:field="*{phone}" placeholder="Enter 10-digit phone" required>
            </div>
            <div class="mb-3">
                <label for="officeId" class="form-label">Office</label>
                <select class="form-select" id="officeId" th:field="*{officeId}">
                    <option value="">-- Select Office --</option>
                    <option th:each="office : ${offices}"
                            th:value="${office.officeId}"
                            th:text="${office.officeId + ' - ' + (office.officeCity != null ? office.officeCity : 'Office')}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label for="addressId" class="form-label">Address</label>
                <select class="form-select" id="addressId" th:field="*{addressId}">
                    <option value="">-- Select Address --</option>
                    <option th:each="address : ${addresses}"
                            th:value="${address.addressId}"
                            th:text="${address.city + ' - ' + address.address}"></option>
                </select>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-1"></i>Save Driver
                </button>
                <a th:href="@{/view/drivers}" class="btn btn-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
