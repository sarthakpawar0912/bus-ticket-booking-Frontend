<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>BusBooking</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-search-heart me-2 text-primary"></i>Search Trips</h2>
        <a th:href="@{/view/trips}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>All Trips
        </a>
    </div>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-4">
            <form th:action="@{/view/trips/search}" method="get" class="row g-3">
                <div class="col-md-5">
                    <label for="searchtrips_from" class="form-label fw-semibold">From City</label>
                    <input type="text" name="from" id="searchtrips_from" class="form-control" required
                           th:value="${from}" placeholder="Mumbai" aria-label="from"/>
                </div>
                <div class="col-md-5">
                    <label for="searchtrips_to" class="form-label fw-semibold">To City</label>
                    <input type="text" name="to" id="searchtrips_to" class="form-control" required
                           th:value="${to}" placeholder="Pune" aria-label="to"/>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-search me-1"></i>Search
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div th:if="${results != null}" class="card shadow-sm border-0">
        <div class="card-header bg-white">
            <span class="fw-semibold">Available Trips</span>
            <span class="badge bg-secondary ms-2" th:text="${#lists.size(results)} + ' matches'">0</span>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>Trip ID</th>
                        <th>Route</th>
                        <th>Departure</th>
                        <th>Arrival</th>
                        <th>Bus</th>
                        <th>Seats</th>
                        <th>Fare</th>
                        <th class="text-end">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t : ${results}">
                        <td th:text="${t.tripId}">1</td>
                        <td th:text="${t.fromCity} + ' to ' + ${t.toCity}">Route</td>
                        <td th:text="${t.departureTime}">-</td>
                        <td th:text="${t.arrivalTime}">-</td>
                        <td th:text="${t.busType} + ' (' + ${t.registrationNumber} + ')'">Bus</td>
                        <td th:text="${t.availableSeats}">40</td>
                        <td th:text="'Rs. ' + ${t.fare}">500</td>
                        <td class="text-end">
                            <a th:href="@{/view/bookings/trip/{id}(id=${t.tripId})}"
                               class="btn btn-sm btn-primary">
                                <i class="bi bi-ticket me-1"></i>Book
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(results)}">
                        <td colspan="8" class="text-center text-muted py-4">No trips found.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
