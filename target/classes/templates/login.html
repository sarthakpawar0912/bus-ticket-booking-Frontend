<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            --bg: #f5efe6;
            --panel: #fffaf3;
            --primary: #0d5c63;
            --primary-dark: #084c52;
            --text: #1f2933;
            --muted: #6b7280;
            --danger: #b42318;
            --border: #d7c9b7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top left, rgba(13, 92, 99, 0.18), transparent 30%),
                linear-gradient(135deg, #f7f1e8 0%, #efe3d3 100%);
            color: var(--text);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .card {
            width: min(100%, 420px);
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 18px;
            background: rgba(255, 250, 243, 0.96);
            box-shadow: 0 18px 40px rgba(31, 41, 51, 0.14);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 18px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: #fff;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px 14px;
            border: 0;
            border-radius: 10px;
            background: var(--primary);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-dark);
        }

        .message {
            margin-top: 16px;
            font-size: 0.95rem;
        }

        .error {
            color: var(--danger);
        }

        .success {
            color: var(--primary-dark);
        }
    </style>
</head>
<body>
<section class="card">
    <h1>Bus Ticket Login</h1>
    <p>Sign in to access the booking dashboard and view pages.</p>

    <form th:action="@{/login}" method="post">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" placeholder="Enter username" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    <div th:if="${param.error}" class="message error">Invalid username or password.</div>
    <div th:if="${param.logout}" class="message success">You have been logged out.</div>
</section>
</body>
</html>
