<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"><title>Update Customer</title></head>
<body class="bg-light">
<nav th:replace="~{fragments/header :: navbar}"></nav>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="fw-bold mb-0"><i class="bi bi-pencil-square me-2 text-warning"></i>Update Customer</h2>
        <a th:href="@{/view/customers}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <form th:action="@{/view/customers/update/{id}(id=${customer.id})}" method="post" class="row g-3">
                <div class="col-md-6">
                    <label for="updatecustomer_name" class="form-label fw-semibold">Full Name</label>
                    <input type="text" class="form-control" name="name" id="updatecustomer_name" required
                           th:value="${customer.name}" placeholder="Sarthak Pawar" aria-label="name"/>
                </div>
                <div class="col-md-6">
                    <label for="updatecustomer_email" class="form-label fw-semibold">Email</label>
                    <input type="email" class="form-control" name="email" id="updatecustomer_email" required
                           th:value="${customer.email}" placeholder="sarthak@example.com" aria-label="email"/>
                </div>
                <div class="col-md-6">
                    <label for="updatecustomer_phone" class="form-label fw-semibold">Phone (10 digits)</label>
                    <input type="tel" class="form-control" name="phone" id="updatecustomer_phone" required
                           pattern="^\d{10}$" th:value="${customer.phone}" placeholder="9876543210" aria-label="phone"/>
                </div>
                <div class="col-md-6">
                    <label for="updatecustomer_addressId" class="form-label fw-semibold">Address</label>
                    <select class="form-select" name="addressId" id="updatecustomer_addressId" aria-label="addressId">
                        <option value="">-- Keep Existing / Select New --</option>
                        <option th:each="a : ${addresses}" th:value="${a.addressId}"
                                th:text="${a.address + ', ' + a.city + ' - ' + a.zipCode}"></option>
                    </select>
                    <div class="form-text">Current City: <strong th:text="${customer.city}">-</strong></div>
                </div>
                <div class="col-12 d-flex gap-2 pt-2">
                    <button type="submit" class="btn btn-warning">
                        <i class="bi bi-save me-1"></i>Update Customer
                    </button>
                    <a th:href="@{/view/customers}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
